<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>drink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link rel="stylesheet" href="/CSS/head.css">
    <link rel="stylesheet" href="/CSS/cards.css">

    <style>
        body {
            font-family: 'Nothing You Could Do', cursive;
        }
    </style>

</head>

<body>
    <div id="header"></div>
    <div class="container">
        <div class="row justify-content-center">
            <!-- 1つ目のテキストボックス -->
            <div class="col-lg-5 d-flex align-items-stretch">
                <div class="card p-3 d-flex flex-column gap-3 w-100">
                    <h4 class="card-title text-center">水</h4>
                    <div class="d-flex flex-row align-items-center gap-3 w-100">
                        <div class="card-body d-flex flex-column justify-content-center">
                            <p class="card-text">
                                富士山の天然水
                            </p>
                        </div>
                        <img src="https://cdn.pixabay.com/photo/2014/12/24/05/02/drop-of-water-578897_640.jpg" 
                             alt="Card image" class="img-fluid rounded">
                    </div>
                </div>
            </div>
            <!-- 2つ目のテキストボックス -->
            <div class="col-lg-5 d-flex align-items-stretch">
                <div class="card p-3 d-flex flex-column gap-3 w-100">
                    <h4 class="card-title text-center">コーヒー</h4>
                    <div class="d-flex flex-row align-items-center gap-3 w-100">
                       <div class="card-body d-flex flex-column justify-content-center">
                          <p class="card-text">
                             やや苦みのある上品な香りのラムダブレンド
                         </p>
                       </div>
                        <img src="https://acha0203.github.io/Cafe-Recursion/images/coffee-6632524_1280.jpg" 
                             alt="Card image" class="img-fluid rounded">                  
                     </div>
                  </div>
            </div>

            
        </div>
        <div class="row justify-content-center">
            <!--　３つ目のテキストボックス -->
            <div class="col-lg-5 d-flex align-items-stretch my-5">
                <div class="card p-3 d-flex flex-column gap-3 w-100">
                    <h4 class="card-title text-center">オレンジジュース</h4>
                    <div class="d-flex flex-row align-items-center gap-3 w-100">
                        <div class="card-body d-flex flex-column justify-content-center">
                            <p class="card-text">
                                果汁100％
                            </p>
                        </div>
                        <img src="https://forest17.com/e55/e55m_0718.jpg" 
                             alt="Card image" class="img-fluid rounded">
                    </div>
                </div>
            </div>
            <!-- ４つ目のテキストボックス -->
            <div class="col-lg-5 d-flex align-items-stretch my-5">
                <div class="card p-3 d-flex flex-column gap-3 w-100">
                    <h4 class="card-title text-center">緑茶</h4>
                    <div class="d-flex flex-row align-items-center gap-3 w-100">
                       <div class="card-body d-flex flex-column justify-content-center">
                          <p class="card-text">
                             静岡県産の茶葉を使用しています
                         </p>
                       </div>
                        <img src="https://thumb.photo-ac.com/4a/4ab5e65900ebb0a7a3ae043d01ef3beb_t.jpeg" 
                             alt="Card image" class="img-fluid rounded">                  
                     </div>
                  </div>
            </div>
            
        </div>
        
     </div>
     

    <script>
        // コンポーネントを読み込む関数
        function loadComponent(id, file) {
            fetch(file)
                .then(response => response.text())
                .then(data => document.getElementById(id).innerHTML = data);
        }

        // ページが読み込まれたら挿入
        document.addEventListener("DOMContentLoaded", function () {
            loadComponent("header", "header.html");
            console.log("Website loaded!");
        });
    </script>

</body>
</html>
