<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>website</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link rel="stylesheet" href="CSS/head.css">
</head>

<body>
    <div id="header"></div>
    <script>
        // コンポーネントを読み込む関数
        function loadComponent(id, file) {
            fetch(file)
                .then(response => response.text())
                .then(data => document.getElementById(id).innerHTML = data);
        }

        // ページが読み込まれたらヘッダーとフッターを挿入
        document.addEventListener("DOMContentLoaded", function () {
            loadComponent("header", "components/header.html");
            console.log("Website loaded!");
        }); 
    </script>   
    <h1 class="text-center text-secondary">Welcome to Cafe Recursion</h1>

    <div class="container-fluid">
        <!-- row -->
        <div class="row justify-content-center mx-2">
           <!-- col -->
           <div class="col-lg-6">
              <div class="card h-100">
                <img src="https://acha0203.github.io/Cafe-Recursion/images/cake-4910417_1280.jpg" alt="Card image" />
                <div class="card-body">
                    <h4 class="card-title">What's New?</h4>
                    <p class="card-text">春の新メニュー「フルーツパイ」をご用意しました。新鮮なフルーツと生クリームのハーモニーをお楽しみください。</p>
                </div>
              </div>
           </div>
           <!-- col -->
           <div class="col-lg-6">
              <div class="card h-100">
                 <img src="https://acha0203.github.io/Cafe-Recursion/images/coffee-6632524_1280.jpg" alt="Card image" />
                 <div class="card-body">
                    <h4 class="card-title">Recommendation</h4>
                    <p class="card-text">今月のお薦めは「ラムダブレンド」。やや苦みのある上品な香りのコーヒーです。</p>
                 </div>
              </div>
           </div>
        </div>
     </div>
</body>
</html>
